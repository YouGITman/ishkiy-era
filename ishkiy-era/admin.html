<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>iSHKiY — practitioner admin</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0F1E3D;--bone:#F5F1E8;--gold:#D4A547}
  body{background:var(--bone);color:var(--ink);font-family:Inter,sans-serif;max-width:680px;margin:0 auto;padding:32px 20px;line-height:1.6}
  h1{font-family:Lora,serif;font-size:26px;margin:6px 0 4px}
  .k{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--gold)}
  input,button,select{font:inherit}
  input{padding:12px 14px;border:1.5px solid rgba(15,30,61,.15);border-radius:12px;width:100%;max-width:320px;background:#fff}
  button{padding:11px 18px;border:none;border-radius:12px;font-weight:700;cursor:pointer}
  .gold{background:var(--gold);color:var(--ink)}
  .ghost{background:none;border:1.5px solid rgba(15,30,61,.25);color:var(--ink)}
  .card{background:#fff;border:1.5px solid rgba(15,30,61,.08);border-radius:16px;padding:18px;margin:14px 0}
  .card b{font-size:16px}
  .meta{font-size:13px;color:rgba(15,30,61,.6);margin:6px 0}
  .row{display:flex;gap:10px;margin-top:12px}
  .pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:999px;background:rgba(212,165,71,.15);color:#8a6a1f}
  #msg{font-size:13.5px;color:rgba(15,30,61,.6);margin-top:10px}
</style>
</head>
<body>
<p class="k">iSHKiY · admin</p>
<h1>Practitioner applications</h1>
<div id="auth">
  <p>Sign in with the admin email. A magic link will arrive — no password.</p>
  <input id="email" type="email" placeholder="tarang@ishkiy.com" autocomplete="email">
  <div class="row"><button id="send" class="gold">Send magic link</button></div>
  <p id="msg"></p>
</div>
<div id="panel" style="display:none">
  <p id="who" class="meta"></p>
  <div class="row" style="margin:0 0 8px">
    <button id="tab-pending" class="ghost">Pending</button>
    <button id="tab-approved" class="ghost">Approved</button>
    <button id="out" class="ghost">Sign out</button>
  </div>
  <div id="list"></div>
</div>
<script src="dist/admin.js"></script>
</body>
</html>
